root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main.exe ."
bin = "tmp/main.exe"
include_ext = ["go", "html", "css", "js", "env"]
include_dir = ["."]
exclude_dir = ["tmp", "vendor", ".git", "static/uploads"]
exclude_file = []
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = true
color = true
